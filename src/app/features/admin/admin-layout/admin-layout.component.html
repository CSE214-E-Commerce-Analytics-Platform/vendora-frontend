<!-- Mobile overlay -->
<div class="sidebar-overlay" [class.visible]="sidebarOpen()" (click)="closeSidebar()"></div>

<div class="admin-layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" [class.open]="sidebarOpen()">

    <!-- Close btn (mobile) -->
    <button class="sidebar-close-btn" (click)="closeSidebar()" aria-label="Close menu">✕</button>

    <div class="sidebar-header">
      <div class="brand-icon">⬡</div>
      <div class="brand-text">
        <span class="brand-name">Admin Panel</span>
        <span class="brand-sub">Management Console</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a routerLink="/admin/users" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Users</span>
      </a>
      <a routerLink="/admin/carts" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Carts</span>
      </a>
      <a routerLink="/admin/stores" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">🏪</span>
        <span class="nav-label">Stores</span>
      </a>
      <a routerLink="/admin/categories" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">📂</span>
        <span class="nav-label">Categories</span>
      </a>
      <a routerLink="/admin/corporate-requests" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">🏢</span>
        <span class="nav-label">Corp. Requests</span>
      </a>
      <a routerLink="/admin/orders" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">📦</span>
        <span class="nav-label">Orders</span>
      </a>
      <a routerLink="/admin/audit-logs" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">🛡️</span>
        <span class="nav-label">Audit Logs</span>
      </a>
      <a routerLink="/admin/settings" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Logout</span>
      </button>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <main class="main-content">

    <header class="top-header">
      <!-- Hamburger -->
      <button class="hamburger-btn" (click)="toggleSidebar()" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

      <div class="header-title">
        <span class="header-accent-bar"></span>
        <h3>Welcome, {{ admin_email_parsed }}</h3>
      </div>

      <div class="header-actions">
        <!-- Theme Toggle -->
        <button class="theme-toggle-btn" (click)="themeService.toggle()" [title]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
          <span *ngIf="themeService.isDark()">☀️</span>
          <span *ngIf="!themeService.isDark()">🌙</span>
        </button>
      </div>
    </header>

    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>
